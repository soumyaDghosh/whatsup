name: Release

on:
  # Run the workflow each time new commits are pushed to the master branch.
  push:
    branches: [ "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish snap to the store
    strategy:
      fail-fast: false
      matrix:
        architecture: [amd64, arm64]
    runs-on: ${{ matrix.architecture == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 600
    steps:
      - uses: actions/checkout@v6      

      - name: Build the snap
        uses: soumyaDghosh/action-build@master
        id: build-snap
        with:
          snapcraft-channel: "8.x/stable"
          enable-github-cache: true

      - name: Publish snap to store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.STORE_LOGIN_EDGE }}
        with:
          snap: ${{ steps.build-snap.outputs.snap }}
          release: edge
