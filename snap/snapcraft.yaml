name: whatsup
title: WhatsUp
base: core24
version: '0.1'
summary: A WhatsApp wrapper using QtWebEngine, and Kirigami
description: |
  "Whatsup" is a desktop client for WhatsApp designed to integrate with the KDE Plasma desktop environment. It acts as a "wrapper" for the web version of WhatsApp, providing a more native-like experience for users on Linux.

grade: stable
confinement: strict

license: GPL-3.0-or-later
contact: soumyadeepghosh2004+whatsup@zohomail.in
issues: https://invent.kde.org/soumyadghosh/whatsup/-/issues
website: https://invent.kde.org/soumyadghosh/whatsup
source-code: https://invent.kde.org/soumyadghosh/whatsup
donation: http://github.com/soumyaDghosh/sponsors

platforms:
  amd64:
  arm64:


parts:
  sccache:
    plugin: dump
    source: 
      - on amd64: https://github.com/mozilla/sccache/releases/download/v0.13.0/sccache-v0.13.0-x86_64-unknown-linux-musl.tar.gz
      - on arm64: https://github.com/mozilla/sccache/releases/download/v0.13.0/sccache-v0.13.0-aarch64-unknown-linux-musl.tar.gz
    organize:
      sccache: bin/sccache
    override-stage: |
      craftctl default
      ${CRAFT_STAGE}/bin/sccache --start-server
    override-prime: ""
  uap-cpp:
    plugin: cmake
    source: https://github.com/ua-parser/uap-cpp.git
    source-depth: 1
    build-snaps:
      - cmake
    build-packages:
      - libre2-dev
      - libyaml-cpp-dev
    cmake-parameters:
      - -DCMAKE_C_COMPILER_LAUNCHER=sccache
      - -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTS=OFF
      - -DCMAKE_C_FLAGS_RELEASE="-s"
      - -DCMAKE_CXX_FLAGS_RELEASE="-s"
    override-build: |
      craftctl default
      install -Dm644 $CRAFT_PART_SRC/UaParser -t $CRAFT_PART_INSTALL/usr/include/uap-cpp/
    prime:
      - -usr/include
      - -usr/lib/*/cmake
      - -usr/lib/*/*.a

  uap-qt:
    after: [uap-cpp]
    plugin: cmake
    source: https://github.com/soumyaDghosh/uap-qt.git
    source-depth: 1
    cmake-parameters:
      - -DCMAKE_C_COMPILER_LAUNCHER=sccache
      - -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_C_FLAGS_RELEASE="-s"
      - -DCMAKE_CXX_FLAGS_RELEASE="-s"
    prime:
      - -usr/include
      - -usr/lib/*/cmake

  whatsup:
    after: [uap-cpp, uap-qt]
    plugin: cmake
    source: https://invent.kde.org/soumyadghosh/whatsup.git
    source-depth: 1
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_C_FLAGS_RELEASE="-s"
      - -DCMAKE_CXX_FLAGS_RELEASE="-s"
      - -DCMAKE_C_COMPILER_LAUNCHER=sccache
      - -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
    override-pull: |
      craftctl default
      sed -i '/ecm_find_qmlmodule(org.kde.kirigami REQUIRED)/d' CMakeLists.txt
    stage-packages:
      - libyaml-cpp0.8
      - libre2-10
    prime:
      - -usr/share/doc

plugs:
  shared-memory:
    private: true

apps:
  whatsup:
    command: usr/bin/whatsup
    extensions: [kde-neon-6]
    common-id: io.github.soumyadghosh.whatsup
    environment:
      QTWEBENGINE_DISABLE_SANDBOX: 1
    plugs:
      - audio-playback
      - audio-record
      - camera
      - network-bind
      - screen-inhibit-control
      - home
      - mpris
